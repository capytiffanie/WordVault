<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>單字本 · WordVault</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Noto+Serif+TC:wght@400;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root { --ink:#1a1612; --paper:#f5f0e8; --cream:#ede8dc; --gold:#c9a84c; --gold-light:#e8d5a3; --rust:#b85c38; --sage:#6b7c5c; --border:#c8bfaa; }
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:'Noto Serif TC',serif;min-height:100vh;}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;}

/* SCREENS */
.login-screen{display:none;position:fixed;inset:0;background:var(--ink);z-index:2000;align-items:center;justify-content:center;flex-direction:column;gap:24px;}
.login-screen.show{display:flex;}
.login-screen h1{font-family:'Playfair Display',serif;color:var(--paper);font-size:2.8rem;font-weight:900;}
.login-screen p{font-family:'JetBrains Mono',monospace;color:var(--gold-light);font-size:0.8rem;letter-spacing:0.12em;}
.login-divider{width:60px;height:3px;background:var(--gold);border-radius:2px;}
.btn-google{display:flex;align-items:center;gap:12px;background:white;color:#333;border:none;border-radius:4px;padding:14px 28px;font-size:1rem;font-weight:700;cursor:pointer;font-family:'Noto Serif TC',serif;box-shadow:0 2px 8px rgba(0,0,0,0.3);transition:all 0.15s;margin-top:8px;}
.btn-google:hover{transform:translateY(-2px);box-shadow:0 4px 16px rgba(0,0,0,0.4);}
.btn-google svg{width:20px;height:20px;}
.loading-screen{display:none;position:fixed;inset:0;background:var(--ink);z-index:1900;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
.loading-screen.show{display:flex;}
.loading-screen h2{font-family:'Playfair Display',serif;color:var(--paper);font-size:1.8rem;}
.loading-screen p{font-family:'JetBrains Mono',monospace;color:var(--gold-light);font-size:0.8rem;letter-spacing:0.1em;}
#app{display:none;}
#app.show{display:block;}

/* HEADER */
header{background:var(--ink);color:var(--paper);padding:20px 40px;display:flex;align-items:center;gap:16px;border-bottom:3px solid var(--gold);}
header h1{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;}
header .sub{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:var(--gold-light);letter-spacing:0.12em;}
.user-info{margin-left:auto;display:flex;align-items:center;gap:10px;}
.user-avatar{width:28px;height:28px;border-radius:50%;border:2px solid var(--gold);}
.user-name{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:var(--gold-light);}
.btn-signout{background:none;border:1px solid #555;color:#aaa;padding:4px 10px;border-radius:3px;cursor:pointer;font-size:0.7rem;font-family:inherit;transition:all 0.15s;}
.btn-signout:hover{border-color:var(--rust);color:var(--rust);}
.sync-status{display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace;font-size:0.68rem;color:var(--gold-light);letter-spacing:0.08em;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#888;}
.sync-dot.ok{background:#6fcf97;}
.sync-dot.err{background:var(--rust);}
.sync-dot.loading{background:var(--gold);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
.stats-bar{background:var(--ink);color:var(--gold-light);padding:8px 40px 18px;display:flex;gap:32px;font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:0.1em;}
.stats-bar b{color:var(--gold);font-size:1rem;}

/* LAYOUT */
.container{max-width:1000px;margin:0 auto;padding:36px 24px 60px;}
.tabs{display:flex;margin-bottom:32px;border-bottom:2px solid var(--border);}
.tab-btn{padding:10px 24px;border:none;background:none;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:0.95rem;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;transition:all 0.2s;}
.tab-btn.active{color:var(--ink);border-bottom-color:var(--gold);font-weight:700;}
.panel{display:none;}
.panel.active{display:block;}

/* FORM */
.add-card{background:white;border:1.5px solid var(--border);border-radius:4px;padding:28px 32px;box-shadow:4px 4px 0 var(--cream);margin-bottom:28px;}
.add-card h2{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-grid .full{grid-column:1/-1;}
label{display:block;font-size:0.78rem;font-weight:700;letter-spacing:0.08em;margin-bottom:5px;color:var(--sage);text-transform:uppercase;}
input,textarea,select{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:3px;font-family:'Noto Serif TC',serif;font-size:0.9rem;background:var(--paper);color:var(--ink);transition:border-color 0.2s;}
input:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold);}
textarea{resize:vertical;min-height:60px;}
.btn-row{display:flex;gap:10px;margin-top:18px;}
.btn{padding:10px 22px;border:none;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:0.88rem;font-weight:700;border-radius:3px;transition:all 0.15s;}
.btn-primary{background:var(--ink);color:var(--paper);}
.btn-primary:hover{background:#333;transform:translateY(-1px);}
.btn-secondary{background:none;color:var(--ink);border:1.5px solid var(--border);}
.btn-secondary:hover{border-color:var(--ink);}
.btn-gold{background:var(--gold);color:var(--ink);}
.btn-gold:hover{background:#b8933c;}
.btn-danger{background:none;color:var(--rust);border:1.5px solid var(--rust);font-size:0.8rem;padding:6px 12px;}
.btn-danger:hover{background:var(--rust);color:white;}
.btn-edit{background:none;color:var(--gold);border:1.5px solid var(--gold);font-size:0.8rem;padding:6px 12px;}
.btn-edit:hover{background:var(--gold);color:var(--ink);}

/* LIST */
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;}
.filter-bar input{max-width:220px;}
.filter-bar select{max-width:150px;}
.tag-filter{display:flex;gap:6px;flex-wrap:wrap;}
.tag-chip{padding:4px 12px;border-radius:20px;font-size:0.75rem;cursor:pointer;border:1.5px solid var(--border);background:none;font-family:inherit;transition:all 0.15s;}
.tag-chip.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.list-toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px;}
.sort-toggle{display:flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:#888;}
.sort-toggle button{background:none;border:1.5px solid var(--border);border-radius:3px;padding:4px 10px;cursor:pointer;font-size:0.75rem;font-family:inherit;transition:all 0.15s;}
.sort-toggle button.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.word-list{display:flex;flex-direction:column;gap:10px;}
.word-card{background:white;border:1.5px solid var(--border);border-radius:4px;padding:16px 20px;display:grid;grid-template-columns:160px 1fr auto;gap:16px;align-items:start;box-shadow:2px 2px 0 var(--cream);transition:box-shadow 0.15s;}
.word-card:hover{box-shadow:4px 4px 0 var(--border);}
.word-card.learned{opacity:0.55;}
.word-text{font-family:'Playfair Display',serif;font-size:1.2rem;font-weight:700;}
.word-pron{font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:#888;margin-top:2px;}
.word-pos{display:inline-block;margin-top:6px;background:var(--cream);border:1px solid var(--border);padding:2px 8px;border-radius:2px;font-size:0.68rem;color:var(--sage);letter-spacing:0.06em;text-transform:uppercase;}
.word-def{font-size:0.88rem;line-height:1.6;}
.word-example{font-size:0.8rem;color:#666;font-style:italic;margin-top:4px;line-height:1.5;}
.word-note{font-size:0.78rem;color:var(--rust);margin-top:4px;}
.word-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px;}
.tag{padding:2px 8px;border-radius:10px;font-size:0.68rem;background:var(--cream);color:var(--sage);border:1px solid var(--border);}
.date-badge{font-size:0.65rem;color:#bbb;}
.word-actions{display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
.learned-toggle{width:36px;height:20px;border-radius:10px;border:1.5px solid var(--border);background:none;cursor:pointer;position:relative;transition:all 0.2s;}
.learned-toggle::after{content:'';position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--border);transition:all 0.2s;}
.learned-toggle.on{background:var(--rust);border-color:var(--rust);}
.learned-toggle.on::after{left:18px;background:white;}
.word-card.needs-review{border:2px solid var(--rust);box-shadow:0 0 0 3px #f0705022,2px 2px 0 var(--cream);background:#fffaf9;}
.word-card.needs-review .word-text{color:var(--rust);}
.needs-review-badge{display:inline-block;font-size:0.65rem;font-family:'JetBrains Mono',monospace;background:var(--rust);color:white;padding:1px 7px;border-radius:10px;vertical-align:middle;margin-left:6px;letter-spacing:0.04em;}
.play-btn{background:none;border:none;cursor:pointer;font-size:0.85rem;padding:0 3px;opacity:0.55;transition:opacity 0.15s;vertical-align:middle;}
.play-btn:hover{opacity:1;}
.play-btn:disabled{opacity:0.3;cursor:wait;}
.cam-link{font-family:'JetBrains Mono',monospace;font-size:0.62rem;font-weight:600;letter-spacing:0.06em;color:var(--sage);text-decoration:none;border:1px solid var(--sage);border-radius:2px;padding:1px 6px;vertical-align:middle;opacity:0.7;transition:all 0.15s;}
.cam-link:hover{opacity:1;background:var(--sage);color:white;}
.pagination{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:24px;flex-wrap:wrap;}
.page-btn{background:none;border:1.5px solid var(--border);border-radius:3px;padding:6px 12px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:0.8rem;transition:all 0.15s;}
.page-btn:hover{border-color:var(--ink);}
.page-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.page-btn:disabled{opacity:0.3;cursor:default;}
.page-info{font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:#888;}

/* REPORT */
.report-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
.report-header h2{font-family:'Playfair Display',serif;font-size:1.4rem;}
.date-nav{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.date-nav button{background:none;border:1.5px solid var(--border);border-radius:3px;padding:6px 12px;cursor:pointer;font-size:0.85rem;transition:all 0.15s;}
.date-nav button:hover{border-color:var(--ink);}
.date-nav span{font-family:'JetBrains Mono',monospace;font-size:0.85rem;}
.report-sheet{background:white;border:1.5px solid var(--border);border-radius:4px;padding:40px 44px;box-shadow:6px 6px 0 var(--cream);}
.report-title{text-align:center;margin-bottom:32px;border-bottom:2px solid var(--ink);padding-bottom:16px;}
.report-title h3{font-family:'Playfair Display',serif;font-size:1.8rem;}
.report-title p{font-family:'JetBrains Mono',monospace;font-size:0.75rem;color:#888;margin-top:6px;letter-spacing:0.1em;}
.report-table{width:100%;border-collapse:collapse;margin-top:8px;}
.report-table th{font-size:0.72rem;letter-spacing:0.1em;text-transform:uppercase;color:var(--sage);font-weight:700;padding:8px 10px;border-bottom:2px solid var(--border);text-align:left;}
.report-table td{padding:10px 10px;border-bottom:1px solid var(--cream);vertical-align:top;font-size:0.85rem;}
.report-table tr:last-child td{border-bottom:none;}
.report-table td:first-child{font-family:'Playfair Display',serif;font-size:1.05rem;font-weight:700;}
.report-table td:nth-child(2){font-family:'JetBrains Mono',monospace;font-size:0.72rem;color:#888;}
.report-table td:nth-child(4){font-size:0.78rem;color:#666;font-style:italic;}
.report-empty{text-align:center;padding:60px;color:#bbb;font-style:italic;}
.print-btn-row{display:flex;justify-content:flex-end;gap:10px;margin-top:24px;}

/* QUIZ */
.quiz-mode-btn{padding:10px 22px;border:1.5px solid var(--border);border-radius:3px;background:none;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:0.9rem;font-weight:700;transition:all 0.15s;color:#888;}
.quiz-mode-btn.active{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.quiz-progress-bar-wrap{background:var(--cream);border-radius:4px;height:6px;margin-bottom:16px;overflow:hidden;}
.quiz-progress-bar{height:100%;background:var(--gold);border-radius:4px;transition:width 0.4s;width:0%;}
.quiz-counter{text-align:center;font-family:'JetBrains Mono',monospace;font-size:0.78rem;color:#888;margin-bottom:20px;letter-spacing:0.08em;}
.flashcard{width:100%;max-width:560px;height:260px;margin:0 auto 16px;cursor:pointer;perspective:1000px;}
.flashcard-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform 0.5s;}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
.flashcard-front,.flashcard-back{position:absolute;inset:0;backface-visibility:hidden;border-radius:6px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;box-shadow:4px 4px 0 var(--border);}
.flashcard-front{background:var(--ink);color:var(--paper);border:2px solid var(--ink);}
.card-word{font-family:'Playfair Display',serif;font-size:2.2rem;font-weight:900;}
.card-pron{font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--gold-light);margin-top:8px;}
.flashcard-back{background:white;border:2px solid var(--border);transform:rotateY(180deg);}
.card-def{font-size:1.1rem;font-weight:700;text-align:center;}
.card-example{font-size:0.82rem;color:#666;font-style:italic;margin-top:10px;text-align:center;}
.card-note{font-size:0.78rem;color:var(--rust);margin-top:6px;}
.flash-hint{text-align:center;font-size:0.78rem;color:#aaa;font-family:'JetBrains Mono',monospace;margin-bottom:16px;}
.flash-actions{display:flex;justify-content:center;gap:16px;}
.btn-remember{background:var(--sage);color:white;padding:12px 32px;border:none;border-radius:3px;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:0.95rem;font-weight:700;transition:all 0.15s;}
.btn-remember:hover{background:#5a6a4c;}
.btn-forgot{background:var(--rust);color:white;padding:12px 32px;border:none;border-radius:3px;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:0.95rem;font-weight:700;transition:all 0.15s;}
.btn-forgot:hover{background:#a04e2e;}
.write-card{background:white;border:1.5px solid var(--border);border-radius:4px;padding:36px 40px;max-width:600px;margin:0 auto;box-shadow:4px 4px 0 var(--cream);}
.write-def{font-size:1.3rem;font-weight:700;text-align:center;margin-bottom:28px;}
.write-hint-boxes{display:flex;flex-wrap:wrap;justify-content:center;gap:6px;margin-bottom:20px;cursor:text;}
.letter-box{width:36px;height:44px;border-bottom:2.5px solid var(--border);display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;font-family:'JetBrains Mono',monospace;font-size:1.2rem;font-weight:600;color:var(--ink);transition:border-color 0.15s;position:relative;}
.letter-box.hint{color:var(--sage);border-bottom-color:var(--sage);}
.letter-box.active{border-bottom-color:var(--gold);}
.letter-box.word-space{width:16px;border-bottom:none;}
.letter-box.correct{border-bottom-color:var(--sage);color:var(--sage);}
.letter-box.wrong{border-bottom-color:var(--rust);color:var(--rust);}
.write-input-hidden{position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;}
.write-feedback{text-align:center;margin-top:12px;font-size:0.9rem;min-height:24px;font-weight:700;}
.write-feedback.correct{color:var(--sage);}
.write-feedback.wrong{color:var(--rust);}
.result-card{background:white;border:1.5px solid var(--border);border-radius:4px;padding:48px 40px;max-width:560px;margin:0 auto;box-shadow:4px 4px 0 var(--cream);text-align:center;}
.result-score{font-family:'Playfair Display',serif;font-size:3.5rem;font-weight:900;color:var(--gold);}
.result-label{font-size:0.9rem;color:#888;margin-bottom:28px;font-family:'JetBrains Mono',monospace;letter-spacing:0.08em;}
.wrong-section-title{font-size:0.78rem;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--rust);margin-bottom:12px;text-align:left;}
.wrong-item{background:var(--paper);border:1px solid var(--border);border-radius:3px;padding:10px 16px;margin-bottom:8px;text-align:left;display:flex;justify-content:space-between;align-items:center;}
.wi-word{font-family:'Playfair Display',serif;font-size:1rem;font-weight:700;}
.wi-def{font-size:0.82rem;color:#666;}

/* MODAL */
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(26,22,18,0.55);z-index:1000;align-items:center;justify-content:center;}
.modal-backdrop.open{display:flex;}
.modal{background:var(--paper);border:2px solid var(--border);border-radius:4px;padding:32px 36px;box-shadow:8px 8px 0 var(--ink);width:100%;max-width:560px;max-height:90vh;overflow-y:auto;position:relative;}
.modal h2{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:20px;}
.modal-close{position:absolute;top:16px;right:18px;background:none;border:none;font-size:1.3rem;cursor:pointer;color:#888;}
.modal-close:hover{color:var(--ink);}

/* REPORT MOBILE CARDS */
.report-card-list{display:none;flex-direction:column;gap:12px;}
.report-card{background:var(--paper);border:1.5px solid var(--border);border-radius:8px;padding:14px 16px;}
.report-card-word{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;margin-bottom:4px;}
.report-card-meta{font-family:'JetBrains Mono',monospace;font-size:0.7rem;color:#888;margin-bottom:6px;}
.report-card-def{font-size:0.88rem;color:var(--ink);margin-bottom:4px;}
.report-card-example{font-size:0.78rem;color:#666;font-style:italic;margin-bottom:4px;}
.report-card-note{font-size:0.75rem;color:var(--rust);}

@media print{
  body::before,.login-screen,.loading-screen{display:none!important;}
  header,.tabs,.print-btn-row,.stats-bar,.date-nav{display:none!important;}
  .report-sheet{box-shadow:none;border:none;padding:0;}
  .container{padding:0;}
  .report-table{display:table!important;}
  .report-card-list{display:none!important;}
  .report-title h3{font-size:1.4rem;}
}
@media(max-width:640px){
  header{padding:16px 20px;}
  .stats-bar{padding:8px 20px 14px;}
  .container{padding:20px 14px;}
  .form-grid{grid-template-columns:1fr;}
  .word-card{grid-template-columns:1fr auto;}
  .word-card>div:nth-child(2){grid-column:1/-1;}
  .report-sheet{padding:20px 14px;}
  .report-table{display:none;}
  .report-card-list{display:flex;}
  .report-title h3{font-size:1.3rem;}
  .report-header{flex-direction:column;align-items:flex-start;gap:10px;}
}
</style>
</head>
<body>

<!-- Login -->
<div class="login-screen" id="login-screen">
  <h1>WordVault</h1>
  <div class="login-divider"></div>
  <p>單字收藏庫</p>
  <button class="btn-google" id="btn-google-login">
    <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
    用 Google 帳號登入
  </button>
</div>

<!-- Loading -->
<div class="loading-screen" id="loading-screen">
  <h2>WordVault</h2>
  <p>載入中…</p>
</div>

<!-- App -->
<div id="app">
  <header>
    <h1>WordVault</h1>
    <span class="sub">單字收藏庫</span>
    <div class="user-info">
      <div class="sync-status">
        <div class="sync-dot loading" id="sync-dot"></div>
        <span id="sync-label">同步中</span>
      </div>

// AUTO IPA
var pronTimer = null;
var lastAutoIPA = '';

function fetchIPA(word) {
  return fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word))
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data&&data[0]&&data[0].phonetics){
        var ph = data[0].phonetics;
        var best = ph.find(function(p){ return p.text&&p.text.trim()&&p.audio; })
                || ph.find(function(p){ return p.text&&p.text.trim(); });
        if (best&&best.text) return best.text.trim();
      }
      return null;
    })
    .catch(function(){ return null; })
    .then(function(ipa){
      if (ipa) return ipa;
      return fetch('https://en.wiktionary.org/w/api.php?action=parse&page='+encodeURIComponent(word)+'&prop=wikitext&format=json&origin=*')
        .then(function(r){ return r.json(); })
        .then(function(data){
          if (!data||!data.parse||!data.parse.wikitext) return null;
          var text = data.parse.wikitext['*'];
          // Match {{IPA|en|/xxx/|/yyy/}} — split by | and find first /.../ or [...]
          var m = text.match(/\{\{IPA\|en\|([^}]+)\}\}/);
          if (m) {
            var parts = m[1].split('|');
            for (var i=0;i<parts.length;i++) {
              var p = parts[i].trim();
              if (p.length>5 && (p.charAt(0)==='/'||p.charAt(0)==='[')) {
                return p.replace(/^\[/,'/').replace(/\]$/,'/');
              }
            }
          }
          // Broader fallback: /ipa/ with 5+ chars and real IPA symbols
          var matches = text.match(/\/[ˈˌæɑɒɔəɛɜɪɨʊʌðŋɡʃʒθa-z\.ːˑ]{5,30}\//gi)||[];
          var valid = matches.filter(function(x){ return /[ˈˌæɑɒɔəɛɜɪʊʌðŋʃʒθː]/.test(x); });
          return valid.length ? valid[0] : null;
        })
        .catch(function(){ return null; });
    });
}

document.getElementById('f-word').addEventListener('input', function() {
  clearTimeout(pronTimer);
  var word = this.value.trim();
  var pf = document.getElementById('f-pron');
  if (!word) { pf.value=''; lastAutoIPA=''; return; }
  pronTimer = setTimeout(function() {
    // Skip only if user manually typed something different from our last auto-fill
    if (pf.value && pf.value !== lastAutoIPA) return;
    pf.placeholder = '查詢中…';
    fetchIPA(word).then(function(ipa){
      pf.placeholder = 'e.g. /ɪˈfemərəl/';
      if (ipa) { pf.value = ipa; lastAutoIPA = ipa; }
      else { pf.value = ''; lastAutoIPA = ''; }
    });
  }, 600);
});

// PRONUNCIATION
var audioCache = {};

window.playWord = function(word, btn) {
  if (!word) return;
  if (btn) { btn.textContent = '⏳'; btn.disabled = true; }
  if (window.speechSynthesis) speechSynthesis.cancel();

  function playWithSpeech() {
    if (btn) { btn.textContent = '🔊'; btn.disabled = false; }
    var utter = new SpeechSynthesisUtterance(word);
    utter.lang = 'en-US'; utter.rate = 0.85;
    var voices = speechSynthesis.getVoices();
    var eng = voices.find(function(v){ return v.lang==='en-US' && v.localService; })
           || voices.find(function(v){ return /en[-_](US|GB|AU)/i.test(v.lang); })
           || voices.find(function(v){ return /en/i.test(v.lang); });
    if (eng) utter.voice = eng;
    utter.onend = function(){ if(btn){ btn.textContent='🔊'; btn.disabled=false; } };
    speechSynthesis.speak(utter);
  }

  function playAudioUrl(url) {
    var audio = new Audio(url);
    var started = false;
    var p = audio.play();
    if (p !== undefined) {
      p.then(function(){ started=true; if(btn){ btn.textContent='🔊'; btn.disabled=false; } })
       .catch(function(){ playWithSpeech(); });
    }
    audio.onended = function(){ if(btn) btn.textContent='🔊'; };
    audio.onerror = function(){ if(!started) playWithSpeech(); };
    setTimeout(function(){ if(!started){ audio.pause(); playWithSpeech(); } }, 4000);
  }

  if (audioCache[word]) {
    audioCache[word]==='speech' ? playWithSpeech() : playAudioUrl(audioCache[word]);
    return;
  }

  fetch('https://api.dictionaryapi.dev/api/v2/entries/en/'+encodeURIComponent(word))
    .then(function(r){ return r.json(); })
    .then(function(data){
      var url='';
      if (data&&data[0]&&data[0].phonetics) {
        var ph=data[0].phonetics;
        var found=ph.find(function(p){ return p.audio&&p.audio.indexOf('-us')>-1; })
               || ph.find(function(p){ return p.audio&&p.audio.length>0; });
        if (found) url=found.audio;
        if (url&&url.indexOf('//')===0) url='https:'+url;
      }
      audioCache[word]=url||'speech';
      url ? playAudioUrl(url) : playWithSpeech();
    })
    .catch(function(){ playWithSpeech(); });
};

// LIST
function renderList() {
  var q2=document.getElementById('search-input').value.toLowerCase();
  var lf=document.getElementById('filter-learned').value;
  var allTags=[];
  words.forEach(function(w){w.tags.forEach(function(t){if(allTags.indexOf(t)===-1)allTags.push(t);});});
  document.getElementById('tag-filter').innerHTML=allTags.map(function(t){
    return '<button class="tag-chip'+(activeTag===t?' active':'')+'" onclick="filterTag(\''+esc(t)+'\')">'+esc(t)+'</button>';
  }).join('');
  var filtered=words.filter(function(w){
    if(q2&&w.word.toLowerCase().indexOf(q2)===-1&&w.def.toLowerCase().indexOf(q2)===-1)return false;
    if(lf==='yes'&&!w.learned)return false;
    if(lf==='no'&&w.learned)return false;
    if(activeTag&&w.tags.indexOf(activeTag)===-1)return false;
    return true;
  });
  if(listSort==='az') filtered.sort(function(a,b){return a.word.toLowerCase().localeCompare(b.word.toLowerCase());});
  var totalPages=Math.max(1,Math.ceil(filtered.length/PAGE_SIZE));
  if(listPage>totalPages)listPage=totalPages;
  var start=(listPage-1)*PAGE_SIZE;
  var pageWords=filtered.slice(start,start+PAGE_SIZE);
  var list=document.getElementById('word-list');
  if(!filtered.length){list.innerHTML='<div style="text-align:center;padding:60px;color:#bbb;font-style:italic">沒有符合的單字</div>';document.getElementById('pagination').innerHTML='';return;}
  var html='';
  pageWords.forEach(function(w){
    var camUrl='https://dictionary.cambridge.org/dictionary/english/'+encodeURIComponent(w.word);
    html+='<div class="word-card'+(w.learned?' needs-review':'')+'">';
    html+='<div><div class="word-text">'+esc(w.word);
    if(w.learned) html+='<span class="needs-review-badge">需加強</span>';
    html+=' <button class="play-btn" onclick="playWord(\''+esc(w.word)+'\',this)" title="播放發音">🔊</button>';
    html+=' <a class="cam-link" href="'+camUrl+'" target="_blank" rel="noopener noreferrer">Cambridge</a></div>';
    if(w.pron)html+='<div class="word-pron">'+esc(w.pron)+'</div>';
    if(w.pos)html+='<span class="word-pos">'+esc(w.pos)+'</span>';
    html+='</div><div>';
    html+='<div class="word-def">'+esc(w.def)+'</div>';
    if(w.example)html+='<div class="word-example">&ldquo;'+esc(w.example)+'&rdquo;</div>';
    if(w.note)html+='<div class="word-note">💡 '+esc(w.note)+'</div>';
    html+='<div class="word-meta">';
    w.tags.forEach(function(t){html+='<span class="tag">'+esc(t)+'</span>';});
    html+='<span class="date-badge">'+esc(w.date)+'</span>';
    html+='</div></div>';
    html+='<div class="word-actions">';
    html+='<button class="learned-toggle'+(w.learned?' on':'')+'" title="'+(w.learned?'取消標記':'標為需要加強')+'" onclick="toggleLearned(\''+w.id+'\')"></button>';
    html+='<button class="btn btn-danger" onclick="deleteWord(\''+w.id+'\')">刪除</button>';
    html+='<button class="btn btn-edit" onclick="openEdit(\''+w.id+'\')">編輯</button>';
    html+='</div></div>';
  });
  list.innerHTML=html;
  var pg='';
  pg+='<button class="page-btn" onclick="goPage('+(listPage-1)+')" '+(listPage<=1?'disabled':'')+'>◀</button>';
  var sp=Math.max(1,listPage-2),ep=Math.min(totalPages,sp+4);
  if(ep-sp<4)sp=Math.max(1,ep-4);
  for(var p=sp;p<=ep;p++) pg+='<button class="page-btn'+(p===listPage?' active':'')+'" onclick="goPage('+p+')">'+p+'</button>';
  pg+='<button class="page-btn" onclick="goPage('+(listPage+1)+')" '+(listPage>=totalPages?'disabled':'')+'>▶</button>';
  pg+='<span class="page-info">'+(filtered.length?start+1:0)+'–'+Math.min(start+PAGE_SIZE,filtered.length)+' / '+filtered.length+' 個單字</span>';
  document.getElementById('pagination').innerHTML=pg;
}

window.printList=function(){
  var q2=document.getElementById('search-input').value.toLowerCase();
  var lf=document.getElementById('filter-learned').value;
  var filtered=words.filter(function(w){
    if(q2&&w.word.toLowerCase().indexOf(q2)===-1&&w.def.toLowerCase().indexOf(q2)===-1)return false;

  win.document.write('<h2>WordVault 單字庫 · 共 '+filtered.length+' 個單字</h2>');

// QUIZ
window.setQuizMode=function(mode){
  quizMode=mode;
  document.getElementById('qmode-flash').classList.toggle('active',mode==='flash');
  document.getElementById('qmode-write').classList.toggle('active',mode==='write');
};
window.updateQuizRange=function(){
  var val=document.getElementById('quiz-range').value;
  document.getElementById('quiz-date-single').style.display=val==='date'?'block':'none';
  document.getElementById('quiz-date-range-wrap').style.display=val==='range'?'block':'none';
};
function getQuizPool(){
  var val=document.getElementById('quiz-range').value;
  var pool=[];
  if(val==='all') pool=words.slice();
  else if(val==='unlearned') pool=words.filter(function(w){return w.learned;});
  else if(val==='today') pool=words.filter(function(w){return w.date===todayStr();});
  else if(val==='date'){var d=document.getElementById('quiz-date-pick').value;pool=words.filter(function(w){return w.date===d;});}
  else if(val==='range'){var s=document.getElementById('quiz-range-start').value,e=document.getElementById('quiz-range-end').value;pool=words.filter(function(w){return w.date>=s&&w.date<=e;});}
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=pool[i];pool[i]=pool[j];pool[j]=tmp;}
  return pool;
}
window.startQuiz=function(){
  var pool=getQuizPool();
  if(!pool.length){alert('這個範圍沒有單字！');return;}
  quizWords=pool;quizIndex=0;quizCorrect=0;quizWrong=[];
  document.getElementById('quiz-setup').style.display='none';
  document.getElementById('quiz-result').style.display='none';
  if(quizMode==='flash'){document.getElementById('quiz-write').style.display='none';document.getElementById('quiz-flash').style.display='block';showFlashCard();}
  else{document.getElementById('quiz-flash').style.display='none';document.getElementById('quiz-write').style.display='block';showWriteCard();}
};
function showFlashCard(){
  if(quizIndex>=quizWords.length){showResult();return;}
  var w=quizWords[quizIndex];cardFlipped=false;
  document.getElementById('flashcard').classList.remove('flipped');
  document.getElementById('flash-front').innerHTML='<div class="card-word">'+esc(w.word)+'</div>'+(w.pron?'<div class="card-pron">'+esc(w.pron)+'</div>':'');
  document.getElementById('flash-back').innerHTML='<div class="card-def">'+esc(w.def)+'</div>'+(w.example?'<div class="card-example">'+esc(w.example)+'</div>':'')+(w.note?'<div class="card-note">💡 '+esc(w.note)+'</div>':'');
  document.getElementById('flash-hint').style.display='block';
  document.getElementById('flash-actions').style.display='none';
  updateQuizProgress('flash');
}
window.flipCard=function(){
  if(cardFlipped)return;cardFlipped=true;
  document.getElementById('flashcard').classList.add('flipped');
  document.getElementById('flash-hint').style.display='none';
  document.getElementById('flash-actions').style.display='flex';
};
window.flashAnswer=function(remembered){
  if(remembered)quizCorrect++;else quizWrong.push(quizWords[quizIndex]);
  quizIndex++;showFlashCard();
};
function showWriteCard(){
  if(quizIndex>=quizWords.length){showResult();return;}
  var w=quizWords[quizIndex];writeAnswered=false;
  document.getElementById('write-def').textContent=w.def;
  buildLetterBoxes(w.word);
  var inp=document.getElementById('write-input');
  inp.value='';inp.disabled=false;
  document.getElementById('write-feedback').textContent='';
  document.getElementById('write-feedback').className='write-feedback';
  document.getElementById('write-submit-btn').textContent='確認';
  // click on boxes focuses hidden input
  document.getElementById('write-hint-boxes').onclick=function(){inp.focus();};
  inp.focus();
  updateQuizProgress('write');
}
function buildLetterBoxes(word){
  var boxes=document.getElementById('write-hint-boxes');
  var html='';
  for(var i=0;i<word.length;i++){
    if(word[i]===' '){
      html+='<div class="letter-box word-space"></div>';
    } else if(i===0){
      html+='<div class="letter-box hint" data-idx="'+i+'">'+esc(word[0])+'</div>';
    } else {
      html+='<div class="letter-box" data-idx="'+i+'"></div>';
    }
  }
  boxes.innerHTML=html;
}
window.syncLetterBoxes=function(){
  var w=quizWords[quizIndex];
  var val=document.getElementById('write-input').value;
  var boxes=document.querySelectorAll('#write-hint-boxes .letter-box:not(.word-space)');
  var letterIdx=0;
  for(var i=0;i<w.word.length;i++){
    if(w.word[i]===' ')continue;
    var box=boxes[letterIdx];
    if(letterIdx===0){letterIdx++;continue;} // skip first (hint)
    var ch=val[letterIdx-1]||''; // offset by 1 because first letter is pre-filled
    box.textContent=ch;
    box.classList.toggle('active', letterIdx-1===val.length-1 && !writeAnswered);
    letterIdx++;
  }
};
window.checkWrite=function(){
  if(writeAnswered){nextWrite();return;}
  var w=quizWords[quizIndex];
  var inp=document.getElementById('write-input');
  // reconstruct full answer: first letter + typed
  var typed=w.word[0]+inp.value;
  var answer=typed.trim().toLowerCase();
  var correct=w.word.trim().toLowerCase();
  writeAnswered=true;
  inp.disabled=true;
  document.getElementById('write-submit-btn').textContent='下一題 →';
  // colour letter boxes
  var boxes=document.querySelectorAll('#write-hint-boxes .letter-box:not(.word-space)');
  var letterIdx=0;
  for(var i=0;i<w.word.length;i++){
    if(w.word[i]===' ')continue;
    var box=boxes[letterIdx];
    box.classList.remove('active');
    if(letterIdx>0){
      var ch=inp.value[letterIdx-1]||'';
      box.textContent=ch||'_';
      box.classList.add(ch.toLowerCase()===w.word[i].toLowerCase()?'correct':'wrong');
    }
    letterIdx++;
  }
  if(answer===correct){
    quizCorrect++;
    document.getElementById('write-feedback').textContent='✓ 正確！';
    document.getElementById('write-feedback').className='write-feedback correct';
  } else {
    quizWrong.push(w);
    document.getElementById('write-feedback').innerHTML='✗ 答案是：<strong>'+esc(w.word)+'</strong>';
    document.getElementById('write-feedback').className='write-feedback wrong';
  }
};
window.skipWrite=function(){if(!writeAnswered){quizWrong.push(quizWords[quizIndex]);writeAnswered=true;}nextWrite();};
function nextWrite(){quizIndex++;showWriteCard();}
function updateQuizProgress(type){
  var pct=quizWords.length?(quizIndex/quizWords.length*100):0;
  document.getElementById(type+'-progress-bar').style.width=pct+'%';
  document.getElementById(type+'-counter').textContent=(quizIndex+1)+' / '+quizWords.length;
}
function showResult(){
  document.getElementById('quiz-flash').style.display='none';
  document.getElementById('quiz-write').style.display='none';
  document.getElementById('quiz-result').style.display='block';
  var total=quizWords.length;
  document.getElementById('result-score').textContent=quizCorrect+' / '+total;
  var pct=Math.round(quizCorrect/total*100);
  var label=pct===100?'完美！🎉':pct>=80?'很棒！繼續加油 💪':pct>=60?'還不錯，再複習一下 📖':'多練幾次，你做得到 🌱';
  document.getElementById('result-label').textContent=pct+'% — '+label;
  var wrongHtml='';
  if(quizWrong.length){
    wrongHtml='<div class="wrong-section-title">答錯的單字（'+quizWrong.length+' 個）</div>';
    quizWrong.forEach(function(w){wrongHtml+='<div class="wrong-item"><span class="wi-word">'+esc(w.word)+'</span><span class="wi-def">'+esc(w.def)+'</span></div>';});
  }
  document.getElementById('result-wrong-list').innerHTML=wrongHtml;
}
window.restartQuiz=function(){
  quizWords=quizWords.concat(quizWrong);
  for(var i=quizWords.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=quizWords[i];quizWords[i]=quizWords[j];quizWords[j]=tmp;}
  quizIndex=0;quizCorrect=0;quizWrong=[];
  document.getElementById('quiz-result').style.display='none';
  if(quizMode==='flash'){document.getElementById('quiz-flash').style.display='block';showFlashCard();}
  else{document.getElementById('quiz-write').style.display='block';showWriteCard();}
};
window.backToSetup=function(){
  document.getElementById('quiz-result').style.display='none';
  document.getElementById('quiz-flash').style.display='none';
  document.getElementById('quiz-write').style.display='none';
  document.getElementById('quiz-setup').style.display='block';
};

// INIT
renderReport();
// Event listeners for list filters (module scope fix)
document.getElementById('search-input').addEventListener('input', function(){ listPage=1; renderList(); });
document.getElementById('filter-learned').addEventListener('change', function(){ listPage=1; renderList(); });
if(typeof speechSynthesis!=='undefined'){
  speechSynthesis.getVoices();
  speechSynthesis.onvoiceschanged=function(){ speechSynthesis.getVoices(); };
}
</script>
